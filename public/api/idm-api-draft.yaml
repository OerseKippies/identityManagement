openapi: 3.0.3
info:
  title: identityManagement API
  version: v1-draft
  description: Draft idM API for OK-Core review. Status DRAFT_IN_MODULE.
servers:
  - url: https://example.invalid
    description: Placeholder URL until deployment is assigned.
tags:
  - name: Health
  - name: Users
  - name: Roles
  - name: Permissions
  - name: Assignments
  - name: ServiceAccounts
  - name: AccessPolicies
  - name: TokenReferences
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /users:
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        $ref: '#/components/requestBodies/CreateUser'
      responses:
        '201':
          $ref: '#/components/responses/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Users]
      summary: List users
      responses:
        '200':
          description: Users
  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Update user
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        $ref: '#/components/requestBodies/UpdateUser'
      responses:
        '200':
          $ref: '#/components/responses/UserResponse'
  /users/{userId}/disable:
    post:
      tags: [Users]
      summary: Disable user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/UserResponse'
  /users/{userId}/enable:
    post:
      tags: [Users]
      summary: Enable user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/UserResponse'
  /users/{userId}/lock:
    post:
      tags: [Users]
      summary: Lock user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/UserResponse'
  /users/{userId}/unlock:
    post:
      tags: [Users]
      summary: Unlock user
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/UserResponse'
  /roles:
    post:
      tags: [Roles]
      summary: Create role
      requestBody:
        $ref: '#/components/requestBodies/CreateRole'
      responses:
        '201':
          $ref: '#/components/responses/RoleResponse'
    get:
      tags: [Roles]
      summary: List roles
      responses:
        '200':
          description: Roles
  /roles/{roleId}:
    get:
      tags: [Roles]
      summary: Get role
      parameters:
        - $ref: '#/components/parameters/RoleId'
      responses:
        '200':
          $ref: '#/components/responses/RoleResponse'
    patch:
      tags: [Roles]
      summary: Update role
      parameters:
        - $ref: '#/components/parameters/RoleId'
      responses:
        '200':
          $ref: '#/components/responses/RoleResponse'
  /roles/{roleId}/disable:
    post:
      tags: [Roles]
      summary: Disable role
      parameters:
        - $ref: '#/components/parameters/RoleId'
      responses:
        '200':
          $ref: '#/components/responses/RoleResponse'
  /permissions:
    post:
      tags: [Permissions]
      summary: Create permission
      requestBody:
        $ref: '#/components/requestBodies/CreatePermission'
      responses:
        '201':
          $ref: '#/components/responses/PermissionResponse'
    get:
      tags: [Permissions]
      summary: List permissions
      responses:
        '200':
          description: Permissions
  /permissions/{permissionId}:
    get:
      tags: [Permissions]
      summary: Get permission
      parameters:
        - $ref: '#/components/parameters/PermissionId'
      responses:
        '200':
          $ref: '#/components/responses/PermissionResponse'
  /users/{userId}/roles/{roleId}:
    post:
      tags: [Assignments]
      summary: Assign role to user
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/RoleId'
      responses:
        '204':
          description: Role assigned
    delete:
      tags: [Assignments]
      summary: Remove role from user
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/RoleId'
      responses:
        '204':
          description: Role removed
  /roles/{roleId}/permissions/{permissionId}:
    post:
      tags: [Assignments]
      summary: Assign permission to role
      parameters:
        - $ref: '#/components/parameters/RoleId'
        - $ref: '#/components/parameters/PermissionId'
      responses:
        '204':
          description: Permission assigned
    delete:
      tags: [Assignments]
      summary: Remove permission from role
      parameters:
        - $ref: '#/components/parameters/RoleId'
        - $ref: '#/components/parameters/PermissionId'
      responses:
        '204':
          description: Permission removed
  /service-accounts:
    post:
      tags: [ServiceAccounts]
      summary: Create service account
      requestBody:
        $ref: '#/components/requestBodies/CreateServiceAccount'
      responses:
        '201':
          $ref: '#/components/responses/ServiceAccountResponse'
    get:
      tags: [ServiceAccounts]
      summary: List service accounts
      responses:
        '200':
          description: Service accounts
  /service-accounts/{serviceAccountId}:
    get:
      tags: [ServiceAccounts]
      summary: Get service account
      parameters:
        - $ref: '#/components/parameters/ServiceAccountId'
      responses:
        '200':
          $ref: '#/components/responses/ServiceAccountResponse'
    patch:
      tags: [ServiceAccounts]
      summary: Update service account
      parameters:
        - $ref: '#/components/parameters/ServiceAccountId'
      responses:
        '200':
          $ref: '#/components/responses/ServiceAccountResponse'
  /service-accounts/{serviceAccountId}/disable:
    post:
      tags: [ServiceAccounts]
      summary: Disable service account
      parameters:
        - $ref: '#/components/parameters/ServiceAccountId'
      responses:
        '200':
          $ref: '#/components/responses/ServiceAccountResponse'
  /service-accounts/{serviceAccountId}/enable:
    post:
      tags: [ServiceAccounts]
      summary: Enable service account
      parameters:
        - $ref: '#/components/parameters/ServiceAccountId'
      responses:
        '200':
          $ref: '#/components/responses/ServiceAccountResponse'
  /service-accounts/{serviceAccountId}/lock:
    post:
      tags: [ServiceAccounts]
      summary: Lock service account
      parameters:
        - $ref: '#/components/parameters/ServiceAccountId'
      responses:
        '200':
          $ref: '#/components/responses/ServiceAccountResponse'
  /service-accounts/{serviceAccountId}/unlock:
    post:
      tags: [ServiceAccounts]
      summary: Unlock service account
      parameters:
        - $ref: '#/components/parameters/ServiceAccountId'
      responses:
        '200':
          $ref: '#/components/responses/ServiceAccountResponse'
  /access-policies:
    post:
      tags: [AccessPolicies]
      summary: Create access policy
      requestBody:
        $ref: '#/components/requestBodies/CreateAccessPolicy'
      responses:
        '201':
          $ref: '#/components/responses/AccessPolicyResponse'
    get:
      tags: [AccessPolicies]
      summary: List access policies
      responses:
        '200':
          description: Access policies
  /access-policies/{policyId}:
    get:
      tags: [AccessPolicies]
      summary: Get access policy
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '200':
          $ref: '#/components/responses/AccessPolicyResponse'
    patch:
      tags: [AccessPolicies]
      summary: Update access policy
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '200':
          $ref: '#/components/responses/AccessPolicyResponse'
  /access-policies/{policyId}/activate:
    post:
      tags: [AccessPolicies]
      summary: Activate access policy
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '200':
          $ref: '#/components/responses/AccessPolicyResponse'
  /access-policies/{policyId}/retire:
    post:
      tags: [AccessPolicies]
      summary: Retire access policy
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '200':
          $ref: '#/components/responses/AccessPolicyResponse'
  /token-references:
    post:
      tags: [TokenReferences]
      summary: Create token reference
      requestBody:
        $ref: '#/components/requestBodies/CreateTokenReference'
      responses:
        '201':
          $ref: '#/components/responses/TokenReferenceResponse'
    get:
      tags: [TokenReferences]
      summary: List token references
      responses:
        '200':
          description: Token references
  /token-references/{tokenReferenceId}:
    get:
      tags: [TokenReferences]
      summary: Get token reference
      parameters:
        - $ref: '#/components/parameters/TokenReferenceId'
      responses:
        '200':
          $ref: '#/components/responses/TokenReferenceResponse'
  /token-references/{tokenReferenceId}/revoke:
    post:
      tags: [TokenReferences]
      summary: Revoke token reference
      parameters:
        - $ref: '#/components/parameters/TokenReferenceId'
      responses:
        '200':
          $ref: '#/components/responses/TokenReferenceResponse'
components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RoleId:
      name: roleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PermissionId:
      name: permissionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ServiceAccountId:
      name: serviceAccountId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PolicyId:
      name: policyId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TokenReferenceId:
      name: tokenReferenceId
      in: path
      required: true
      schema: { type: string, format: uuid }
  requestBodies:
    CreateUser:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [username, displayName, email]
            properties:
              username: { type: string }
              displayName: { type: string }
              email: { type: string, format: email }
    UpdateUser:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              displayName: { type: string }
              email: { type: string, format: email }
    CreateRole:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [roleCode, roleName]
            properties:
              roleCode: { type: string }
              roleName: { type: string }
              description: { type: string }
    CreatePermission:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [permissionCode, permissionName]
            properties:
              permissionCode: { type: string }
              permissionName: { type: string }
              description: { type: string }
    CreateServiceAccount:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [accountName]
            properties:
              accountName: { type: string }
              description: { type: string }
    CreateAccessPolicy:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [policyCode, policyName]
            properties:
              policyCode: { type: string }
              policyName: { type: string }
              description: { type: string }
    CreateTokenReference:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [subjectType, subjectId, expiresAt]
            properties:
              subjectType:
                type: string
                enum: [USER, SERVICE_ACCOUNT]
              subjectId: { type: string, format: uuid }
              expiresAt: { type: string }
  responses:
    UserResponse:
      description: User response
    RoleResponse:
      description: Role response
    PermissionResponse:
      description: Permission response
    ServiceAccountResponse:
      description: Service account response
    AccessPolicyResponse:
      description: Access policy response
    TokenReferenceResponse:
      description: Token reference response
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [errorCode, errorMessage, correlationId, timestamp]
          properties:
            errorCode:
              type: string
              enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, BOUNDARY_VIOLATION, INTERNAL_ERROR]
            errorMessage: { type: string }
            correlationId: { type: string }
            timestamp: { type: string, format: date-time }
